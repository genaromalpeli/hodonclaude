version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hodon_db
    environment:
      POSTGRES_USER: hodon
      POSTGRES_PASSWORD: hodon_secret
      POSTGRES_DB: hodon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hodon -d hodon"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
